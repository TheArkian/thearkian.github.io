<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <p>test</p>
    </div>
    <div id="footer"><p>This is a footer.
        This stays at the bottom of the page.</p>
        <img id="img-mode" style="float: left; margin-top: 5px;" src="https://fonts.gstatic.com/s/i/materialiconsoutlined/light_mode/v4/24px.svg"><span style="-webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;">&nbsp</span>
        <label class="switch">
            <input type="checkbox" onclick="darkMode()">
            <span class="slider round"></span>
        </label>
    </div>
    <script>
        function darkMode() {
            var element = document.body;
            element.classList.toggle("dark-mode");
            if(element.className == "dark-mode") document.getElementById("img-mode").src = "https://fonts.gstatic.com/s/i/materialiconsoutlined/dark_mode/v4/24px.svg";
            else document.getElementById("img-mode").src = "https://fonts.gstatic.com/s/i/materialiconsoutlined/light_mode/v4/24px.svg";
        }
    </script>
</body>
</html>
